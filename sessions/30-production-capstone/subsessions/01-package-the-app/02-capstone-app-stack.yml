apiVersion: v1
kind: ConfigMap
metadata:
  name: app-runtime-config
  namespace: message-board-prod
data:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: appdb
  USER_SERVICE_URL: http://user-service:5001/api/users
  APP_SERVICE_URL: http://app-service:5002/api/apps
  USER_SERVICE_HEALTH_URL: http://user-service:5001/readyz
  APP_SERVICE_HEALTH_URL: http://app-service:5002/readyz
---
apiVersion: v1
kind: Secret
metadata:
  name: app-db-secret
  namespace: message-board-prod
type: Opaque
stringData:
  DB_USER: appuser
  DB_PASSWORD: apppassword
  FLASK_SECRET_KEY: replace-this-before-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: message-board-prod
  labels:
    app: postgres
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-runtime-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-db-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-db-secret
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - appuser
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: message-board-prod
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: message-board-prod
  labels:
    app: user-service
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        tier: api
    spec:
      containers:
        - name: user-service
          image: prashantdey/appk8stutorial:user-svc-2.0
          ports:
            - containerPort: 5001
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-runtime-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-runtime-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-runtime-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-db-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: message-board-prod
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 5001
      targetPort: 5001
---
