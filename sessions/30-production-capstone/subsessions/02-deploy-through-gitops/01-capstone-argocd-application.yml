apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: message-board-capstone
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/batch16a-k8s.git
    targetRevision: main
    path: sessions/30-production-capstone/subsessions/01-package-the-app
  destination:
    server: https://kubernetes.default.svc
    namespace: message-board-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
