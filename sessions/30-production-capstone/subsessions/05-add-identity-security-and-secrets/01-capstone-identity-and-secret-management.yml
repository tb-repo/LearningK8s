apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-runtime
  namespace: message-board-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-runtime
  namespace: message-board-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-readonly-discovery
  namespace: message-board-prod
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - services
      - endpoints
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-readonly-discovery
  namespace: message-board-prod
subjects:
  - kind: ServiceAccount
    name: frontend-runtime
    namespace: message-board-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-readonly-discovery
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-readonly-discovery
  namespace: message-board-prod
subjects:
  - kind: ServiceAccount
    name: api-runtime
    namespace: message-board-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-readonly-discovery
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager-prod
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-db-secret
  namespace: message-board-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-prod
    kind: ClusterSecretStore
  target:
    name: app-db-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: prod/message-board/database
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: prod/message-board/database
        property: password
    - secretKey: FLASK_SECRET_KEY
      remoteRef:
        key: prod/message-board/frontend
        property: flaskSecretKey
