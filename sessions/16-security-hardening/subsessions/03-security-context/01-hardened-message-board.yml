apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-board-hardened
  namespace: security-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: message-board-hardened
  template:
    metadata:
      labels:
        app: message-board-hardened
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: prashantdey/appk8stutorial:1.0
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: sqlite:////tmp/messages.db
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL