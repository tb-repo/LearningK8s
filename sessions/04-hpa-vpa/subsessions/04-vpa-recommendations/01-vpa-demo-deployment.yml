apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpa-demo
  namespace: app-autoscaling
  labels:
    app: vpa-demo
    autoscaling-demo: vpa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpa-demo
      autoscaling-demo: vpa
  template:
    metadata:
      labels:
        app: vpa-demo
        autoscaling-demo: vpa
    spec:
      containers:
        - name: vpa-demo
          image: registry.k8s.io/hpa-example
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: vpa-demo
  namespace: app-autoscaling
  labels:
    app: vpa-demo
    autoscaling-demo: vpa
spec:
  type: ClusterIP
  selector:
    app: vpa-demo
    autoscaling-demo: vpa
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
