apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: training-secondary-bridge
  namespace: cni-lab
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "type": "bridge",
      "bridge": "training-br0",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.50.0/24",
        "rangeStart": "192.168.50.20",
        "rangeEnd": "192.168.50.100",
        "routes": [
          {
            "dst": "192.168.50.0/24"
          }
        ]
      }
    }
