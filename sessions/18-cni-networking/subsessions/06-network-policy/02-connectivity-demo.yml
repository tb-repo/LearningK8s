apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cni-lab
  labels:
    app: cni-demo
    role: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cni-demo
      role: frontend
  template:
    metadata:
      labels:
        app: cni-demo
        role: frontend
    spec:
      containers:
        - name: frontend
          image: busybox:1.36
          command:
            - sh
            - -c
            - sleep 3600
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cni-lab
  labels:
    app: cni-demo
    role: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cni-demo
      role: backend
  template:
    metadata:
      labels:
        app: cni-demo
        role: backend
    spec:
      containers:
        - name: backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /www && echo backend-ok > /www/index.html && httpd -f -p 8080 -h /www
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: cni-lab
  labels:
    app: cni-demo
    role: backend
spec:
  type: ClusterIP
  selector:
    app: cni-demo
    role: backend
  ports:
    - name: http
      port: 8080
      targetPort: http
