name: build-message-board
on:
  push:
    paths:
      - app/**
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend image
        run: docker build -t example/message-board-frontend:${{ github.sha }} app/frontend
      - name: Build user service image
        run: docker build -t example/message-board-user:${{ github.sha }} app/user-service
      - name: Build app service image
        run: docker build -t example/message-board-app:${{ github.sha }} app/app-service