apiVersion: apps/v1
kind: Deployment
metadata:
  name: low-priority-workers
  namespace: scheduling-lab
spec:
  replicas: 3
  selector:
    matchLabels:
      app: low-priority-workers
  template:
    metadata:
      labels:
        app: low-priority-workers
    spec:
      priorityClassName: lab-low-priority
      containers:
        - name: worker
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
