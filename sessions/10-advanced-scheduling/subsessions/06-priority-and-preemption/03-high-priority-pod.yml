apiVersion: v1
kind: Pod
metadata:
  name: high-priority-demo
  namespace: scheduling-lab
  labels:
    app: high-priority-demo
spec:
  priorityClassName: lab-high-priority
  containers:
    - name: important-worker
      image: registry.k8s.io/pause:3.10
      resources:
        requests:
          cpu: 250m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
