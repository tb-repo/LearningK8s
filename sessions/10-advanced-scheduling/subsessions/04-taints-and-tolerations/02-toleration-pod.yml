apiVersion: v1
kind: Pod
metadata:
  name: toleration-demo
  namespace: scheduling-lab
  labels:
    app: toleration-demo
spec:
  nodeSelector:
    training.k8s.io/node-role: scheduling-lab
  tolerations:
    - key: training.k8s.io/dedicated
      operator: Equal
      value: scheduling
      effect: NoSchedule
  containers:
    - name: web
      image: nginx:1.27-alpine
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
