apiVersion: v1
kind: Pod
metadata:
  name: cache-anchor
  namespace: scheduling-lab
  labels:
    app: cache-anchor
spec:
  containers:
    - name: cache
      image: redis:7-alpine
      ports:
        - containerPort: 6379
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
