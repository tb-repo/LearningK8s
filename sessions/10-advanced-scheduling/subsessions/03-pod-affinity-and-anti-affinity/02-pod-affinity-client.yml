apiVersion: apps/v1
kind: Deployment
metadata:
  name: affinity-client
  namespace: scheduling-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: affinity-client
  template:
    metadata:
      labels:
        app: affinity-client
    spec:
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: cache-anchor
                topologyKey: kubernetes.io/hostname
      containers:
        - name: client
          image: nginx:1.27-alpine
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
