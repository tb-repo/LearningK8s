apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-selector-demo
  namespace: scheduling-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-selector-demo
  template:
    metadata:
      labels:
        app: node-selector-demo
    spec:
      nodeSelector:
        training.k8s.io/node-role: scheduling-lab
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
