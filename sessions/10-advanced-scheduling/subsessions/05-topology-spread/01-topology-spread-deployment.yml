apiVersion: apps/v1
kind: Deployment
metadata:
  name: topology-spread-web
  namespace: scheduling-lab
spec:
  replicas: 4
  selector:
    matchLabels:
      app: topology-spread-web
  template:
    metadata:
      labels:
        app: topology-spread-web
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: topology-spread-web
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
