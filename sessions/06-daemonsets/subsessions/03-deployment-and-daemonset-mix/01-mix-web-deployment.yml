apiVersion: apps/v1
kind: Deployment
metadata:
  name: mix-web
  namespace: daemonset-lab
  labels:
    app: mix-web
    workload: deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: mix-web
      workload: deployment
  template:
    metadata:
      labels:
        app: mix-web
        workload: deployment
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
