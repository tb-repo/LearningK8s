apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-static-hostpath-pv
  labels:
    app: postgres
    storage-demo: static
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /tmp/k8s-three-tier-postgres
    type: DirectoryOrCreate

