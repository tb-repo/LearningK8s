apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-message-board
  labels:
    app.kubernetes.io/name: message-board
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app.kubernetes.io/name: message-board
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}