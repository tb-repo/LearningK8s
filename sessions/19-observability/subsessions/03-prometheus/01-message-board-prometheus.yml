apiVersion: v1
kind: Namespace
metadata:
  name: observability-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-board
  namespace: observability-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: message-board
  template:
    metadata:
      labels:
        app: message-board
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: app
          image: prashantdey/appk8stutorial:1.0
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: DATABASE_URL
              value: sqlite:////tmp/messages.db
---
apiVersion: v1
kind: Service
metadata:
  name: message-board
  namespace: observability-lab
  labels:
    app: message-board
spec:
  selector:
    app: message-board
  ports:
    - name: http
      port: 80
      targetPort: http
