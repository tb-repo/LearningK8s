apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: message-board-db
  namespace: secrets-lab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: batch16a/message-board
        property: postgresPassword