apiVersion: v1
kind: Namespace
metadata:
  name: iam-lab
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: message-board-aws
  namespace: iam-lab
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<account-id>:role/MessageBoardAppRole
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-board
  namespace: iam-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-board
  template:
    metadata:
      labels:
        app: message-board
    spec:
      serviceAccountName: message-board-aws
      containers:
        - name: app
          image: prashantdey/appk8stutorial:1.0
          env:
            - name: DATABASE_URL
              value: sqlite:////tmp/messages.db
          ports:
            - containerPort: 5000