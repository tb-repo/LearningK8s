apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: messageboards.training.example.com
spec:
  group: training.example.com
  scope: Namespaced
  names:
    plural: messageboards
    singular: messageboard
    kind: MessageBoard
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                replicas:
                  type: integer
                  minimum: 1