apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: karpenter-training
spec:
  template:
    metadata:
      labels:
        workload-tier: training-general
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: karpenter-training
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values:
            - c
            - m
            - r
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values:
            - "5"
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: topology.kubernetes.io/zone
          operator: In
          values:
            - us-east-2a
            - us-east-2b
            - us-east-2c
  limits:
    cpu: "20"
    memory: 80Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    budgets:
      - nodes: 10%
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: karpenter-training
spec:
  role: KarpenterNodeRole-demo-batch16a
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: demo-batch16a
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: demo-batch16a
  tags:
    training-session: production-scaling
    managed-by: karpenter
