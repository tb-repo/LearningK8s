# API version of this Kubernetes object
apiVersion: autoscaling/v2
# Type of Kubernetes resource
kind: HorizontalPodAutoscaler
# Object metadata: name, namespace, labels, annotations
metadata:
  # Name of the object or container
  name: external-queue-worker
  # Namespace in which the object is created
  namespace: app-scaling-prod
  # Labels used for grouping and selecting objects
  labels:
    # Application label
    app: custom-metric-demo
    scaling-demo: external-metrics
# Desired state of this object
spec:
  # Target Deployment/StatefulSet for this HPA
  scaleTargetRef:
    # API version of this Kubernetes object
    apiVersion: apps/v1
    # Type of Kubernetes resource
    kind: Deployment
    # Name of the object or container
    name: custom-metric-demo
  # Minimum pods allowed by HPA
  minReplicas: 1
  # Maximum pods allowed by HPA
  maxReplicas: 10
  # Metrics the HPA uses to scale
  metrics:
    - type: External
      external:
        metric:
          # Name of the object or container
          name: sqs_queue_messages_visible
          # Selector used to choose matching objects
          selector:
            # Label matching rules for selectors
            matchLabels:
              queue_name: training-autoscaling-demo
        # Target object or metric
        target:
          type: AverageValue
          averageValue: "5"
  # Scaling rules for HPA behavior
  behavior:
    # Rules for scaling up pods
    scaleUp:
      # Delay window to stabilize before scaling changes
      stabilizationWindowSeconds: 0
      # Allowed scaling increments and rates
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    # Rules for scaling down pods
    scaleDown:
      # Delay window to stabilize before scaling changes
      stabilizationWindowSeconds: 300
      # Allowed scaling increments and rates
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
