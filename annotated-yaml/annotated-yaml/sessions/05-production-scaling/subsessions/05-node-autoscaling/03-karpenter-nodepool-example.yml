# API version of this Kubernetes object
# API version of this Kubernetes object
apiVersion: karpenter.sh/v1
# Type of Kubernetes resource
# Type of Kubernetes resource
kind: NodePool
# Object metadata: name, namespace, labels, annotations
# Object metadata: name, namespace, labels, annotations
metadata:
  # Name of the object or container
  # Name of the object or container
  name: karpenter-training
# Desired state of this object
# Desired state of this object
spec:
  # Pod template for controllers like Deployment/StatefulSet
  # Pod template for controllers like Deployment/StatefulSet
  template:
    # Object metadata: name, namespace, labels, annotations
    # Object metadata: name, namespace, labels, annotations
    metadata:
      # Labels used for grouping and selecting objects
      # Labels used for grouping and selecting objects
      labels:
        workload-tier: training-general
    # Desired state of this object
    # Desired state of this object
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        # Type of Kubernetes resource
        # Type of Kubernetes resource
        kind: EC2NodeClass
        # Name of the object or container
        # Name of the object or container
        name: karpenter-training
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values:
            - c
            - m
            - r
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values:
            - "5"
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: topology.kubernetes.io/zone
          operator: In
          values:
            - us-east-2a
            - us-east-2b
            - us-east-2c
  # Maximum resources the container may use
  # Maximum resources the container may use
  limits:
    cpu: "20"
    memory: 80Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    budgets:
      - nodes: 10%
