# API version of this Kubernetes object
# API version of this Kubernetes object
apiVersion: eksctl.io/v1alpha5
# Type of Kubernetes resource
# Type of Kubernetes resource
kind: ClusterConfig
# Object metadata: name, namespace, labels, annotations
# Object metadata: name, namespace, labels, annotations
metadata:
  # Name of the object or container
  # Name of the object or container
  name: tb-k8s-cluster-1
  region: ap-south-1

# Enable OIDC and create IAM service accounts for addons that need permissions
iam:
  withOIDC: true
  serviceAccounts:
    - metadata:
        # Name of the object or container
        # Name of the object or container
        name: aws-load-balancer-controller
        # Namespace in which the object is created
        # Namespace in which the object is created
        namespace: kube-system
      attachPolicyARNs:
        - arn:aws:iam::ACCOUNT_ID:policy/AWSLoadBalancerControllerIAMPolicy
      roleName: eksctl-tb-k8s-cluster-1-aws-load-balancer-controller-Role
    - metadata:
        # Name of the object or container
        # Name of the object or container
        name: ebs-csi-controller-sa
        # Namespace in which the object is created
        # Namespace in which the object is created
        namespace: kube-system
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
      roleName: eksctl-tb-k8s-cluster-1-ebs-csi-role

managedNodeGroups:
  - name: standard-workers
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 2
    maxSize: 3

addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver
    version: latest

# You can add more managed addons or install controllers via Helm after creation.

# If the service account already exists in Kubernetes, use override to attach IAM role:
# eksctl create iamserviceaccount --cluster tb-k8s-cluster-1 --region ap-south-1 --namespace kube-system --name ebs-csi-controller-sa --attach-policy-arn arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy --approve --override-existing-serviceaccounts
#
# If the addon is already present, this command is enough to fix the IAM binding:
# eksctl create addon --cluster tb-k8s-cluster-1 --region ap-south-1 --name aws-ebs-csi-driver

