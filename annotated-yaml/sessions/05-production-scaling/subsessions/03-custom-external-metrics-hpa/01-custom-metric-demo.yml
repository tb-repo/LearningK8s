# API version of this Kubernetes object
apiVersion: apps/v1
# Type of Kubernetes resource
kind: Deployment
# Object metadata: name, namespace, labels, annotations
metadata:
  # Name of the object or container
  name: custom-metric-demo
  # Namespace in which the object is created
  namespace: app-scaling-prod
  # Labels used for grouping and selecting objects
  labels:
    # Application label
    app: custom-metric-demo
    scaling-demo: custom-metrics
# Desired state of this object
spec:
  # Desired number of pod replicas
  replicas: 1
  # Selector used to choose matching pods or objects
  selector:
    # Label matching rules for selectors
    matchLabels:
      # Application label
      app: custom-metric-demo
      scaling-demo: custom-metrics
  # Pod template for controllers like Deployment/StatefulSet
  template:
    # Object metadata: name, namespace, labels, annotations
    metadata:
      # Labels used for grouping and selecting objects
      labels:
        # Application label
        app: custom-metric-demo
        scaling-demo: custom-metrics
      # Annotations for non-identifying metadata
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    # Desired state of this object
    spec:
      # Container definitions in the pod
      containers:
        - name: custom-metric-demo
          # Container image to run
          image: python:3.12-alpine
          # When Kubernetes pulls the container image
          imagePullPolicy: IfNotPresent
          # Container startup command
          command:
            - python
            - -c
          # Arguments passed to the command
          args:
            - |
              from http.server import BaseHTTPRequestHandler, HTTPServer
              import os
              import time

              requests_total = 0
              work_total = 0
              start_time = time.time()

              class Handler(BaseHTTPRequestHandler):
                  def log_message(self, fmt, *args):
                      return

                  def do_GET(self):
                      global requests_total, work_total
                      if self.path.startswith("/metrics"):
                          pod = os.environ.get("HOSTNAME", "unknown")
                          namespace = open("/var/run/secrets/kubernetes.io/serviceaccount/namespace").read().strip()
                          body = (
                              "# TYPE http_requests_total counter\n"
                              f"http_requests_total{{namespace=\"{namespace}\",pod=\"{pod}\"}} {requests_total}\n"
                              "# TYPE work_items_total counter\n"
                              f"work_items_total{{namespace=\"{namespace}\",pod=\"{pod}\"}} {work_total}\n"
                              "# TYPE process_uptime_seconds gauge\n"
                              f"process_uptime_seconds{{namespace=\"{namespace}\",pod=\"{pod}\"}} {int(time.time() - start_time)}\n"
                          )
                      elif self.path.startswith("/work"):
                          requests_total += 1
                          work_total += 1
                          body = "work accepted\n"
                      elif self.path.startswith("/healthz") or self.path.startswith("/readyz"):
                          body = "ok\n"
                      else:
                          requests_total += 1
                          body = "ok\n"
                      self.send_response(200)
                      self.send_header("Content-Type", "text/plain")
                      self.end_headers()
                      self.wfile.write(body.encode())

              HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          # Ports exposed by this object or container
          ports:
            - name: http
              # Port exposed by the container
              containerPort: 8080
          readinessProbe:
            httpGet:
              # Filesystem path for a volume
              path: /readyz
              # Port exposed by the Service or container
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              # Filesystem path for a volume
              path: /healthz
              # Port exposed by the Service or container
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          # CPU/memory requests and limits or other resource settings
          resources:
            # Guaranteed resources requested for scheduling
            requests:
              cpu: "100m"
              memory: "128Mi"
            # Maximum resources the container may use
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# API version of this Kubernetes object
apiVersion: v1
# Type of Kubernetes resource
kind: Service
# Object metadata: name, namespace, labels, annotations
metadata:
  # Name of the object or container
  name: custom-metric-demo
  # Namespace in which the object is created
  namespace: app-scaling-prod
  # Labels used for grouping and selecting objects
  labels:
    # Application label
    app: custom-metric-demo
    scaling-demo: custom-metrics
  # Annotations for non-identifying metadata
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "80"
# Desired state of this object
spec:
  type: ClusterIP
  # Selector used to choose matching pods or objects
  selector:
    # Application label
    app: custom-metric-demo
    scaling-demo: custom-metrics
  # Ports exposed by this object or container
  ports:
    - name: http
      # Network protocol for the port
      protocol: TCP
      # Port exposed by the Service or container
      port: 80
      # Destination port on the container for Service traffic
      targetPort: 8080
