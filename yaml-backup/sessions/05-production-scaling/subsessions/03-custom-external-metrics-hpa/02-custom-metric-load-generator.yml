apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-metric-load-generator
  namespace: app-scaling-prod
  labels:
    app: custom-metric-load-generator
    scaling-demo: custom-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-metric-load-generator
      scaling-demo: custom-metrics
  template:
    metadata:
      labels:
        app: custom-metric-load-generator
        scaling-demo: custom-metrics
    spec:
      containers:
        - name: custom-metric-load-generator
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - while true; do wget -q -O- http://custom-metric-demo.app-scaling-prod.svc.cluster.local/work >/dev/null; sleep 0.2; done
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
