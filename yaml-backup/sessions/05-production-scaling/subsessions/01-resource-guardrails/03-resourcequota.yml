apiVersion: v1
kind: ResourceQuota
metadata:
  name: scaling-quota
  namespace: app-scaling-prod
spec:
  hard:
    pods: "50"
    requests.cpu: "20"
    requests.memory: "24Gi"
    limits.cpu: "40"
    limits.memory: "48Gi"
    services: "20"
    services.loadbalancers: "2"
    persistentvolumeclaims: "10"
    configmaps: "30"
    secrets: "30"
