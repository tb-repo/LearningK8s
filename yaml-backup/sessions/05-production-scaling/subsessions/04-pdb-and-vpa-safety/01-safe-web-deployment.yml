apiVersion: apps/v1
kind: Deployment
metadata:
  name: safe-web
  namespace: app-scaling-prod
  labels:
    app: safe-web
    scaling-demo: pdb-vpa
spec:
  replicas: 3
  selector:
    matchLabels:
      app: safe-web
      scaling-demo: pdb-vpa
  template:
    metadata:
      labels:
        app: safe-web
        scaling-demo: pdb-vpa
    spec:
      containers:
        - name: safe-web
          image: nginx:1.27
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: safe-web
  namespace: app-scaling-prod
  labels:
    app: safe-web
    scaling-demo: pdb-vpa
spec:
  type: ClusterIP
  selector:
    app: safe-web
    scaling-demo: pdb-vpa
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
