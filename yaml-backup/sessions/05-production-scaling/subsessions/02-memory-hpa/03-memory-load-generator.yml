apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-load-generator
  namespace: app-scaling-prod
  labels:
    app: memory-load-generator
    scaling-demo: memory-hpa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-load-generator
      scaling-demo: memory-hpa
  template:
    metadata:
      labels:
        app: memory-load-generator
        scaling-demo: memory-hpa
    spec:
      containers:
        - name: memory-load-generator
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - while true; do wget -q -O- http://memory-demo.app-scaling-prod.svc.cluster.local/allocate; sleep 1; done
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
