apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: app-ingress
  labels:
    app: frontend
    tier: presentation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      tier: presentation
  template:
    metadata:
      labels:
        app: frontend
        tier: presentation
    spec:
      containers:
        - name: frontend
          image: prashantdey/appk8stutorial:frontend-svc-2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: USER_SERVICE_URL
              value: http://user-service:5001/api/users
            - name: APP_SERVICE_URL
              value: http://app-service:5002/api/apps
            - name: USER_SERVICE_HEALTH_URL
              value: http://user-service:5001/readyz
            - name: APP_SERVICE_HEALTH_URL
              value: http://app-service:5002/readyz
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: FLASK_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 8
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: app-ingress
spec:
  type: ClusterIP
  selector:
    app: frontend
    tier: presentation
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
