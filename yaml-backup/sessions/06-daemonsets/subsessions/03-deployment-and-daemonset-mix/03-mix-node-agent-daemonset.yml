apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mix-node-agent
  namespace: daemonset-lab
  labels:
    app: mix-node-agent
    workload: daemonset
spec:
  selector:
    matchLabels:
      app: mix-node-agent
      workload: daemonset
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: mix-node-agent
        workload: daemonset
    spec:
      terminationGracePeriodSeconds: 10
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: node-agent
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              while true; do
                echo "$(date) node-agent pod=${POD_NAME} node=${NODE_NAME}";
                sleep 30;
              done
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
