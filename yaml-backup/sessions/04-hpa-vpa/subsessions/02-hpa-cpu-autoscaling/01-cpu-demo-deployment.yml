apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-demo
  namespace: tb-app-autoscaling
  labels:
    app: cpu-demo
    autoscaling-demo: hpa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpu-demo
      autoscaling-demo: hpa
  template:
    metadata:
      labels:
        app: cpu-demo
        autoscaling-demo: hpa
    spec:
      containers:
        - name: cpu-demo
          image: registry.k8s.io/hpa-example
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cpu-demo
  namespace: tb-app-autoscaling
  labels:
    app: cpu-demo
    autoscaling-demo: hpa
spec:
  type: ClusterIP
  selector:
    app: cpu-demo
    autoscaling-demo: hpa
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
