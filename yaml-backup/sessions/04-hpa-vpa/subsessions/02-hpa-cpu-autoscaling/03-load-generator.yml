apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: app-autoscaling
  labels:
    app: load-generator
    autoscaling-demo: hpa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
      autoscaling-demo: hpa
  template:
    metadata:
      labels:
        app: load-generator
        autoscaling-demo: hpa
    spec:
      containers:
        - name: load-generator
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - while true; do wget -q -O- http://cpu-demo.app-autoscaling.svc.cluster.local >/dev/null; done
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
