# API version of this Kubernetes object
apiVersion: apps/v1
# Type of Kubernetes resource
kind: DaemonSet
# Object metadata: name, namespace, labels, annotations
metadata:
  # Name of the object or container
  name: mix-node-agent
  # Namespace in which the object is created
  namespace: daemonset-lab
  # Labels used for grouping and selecting objects
  labels:
    app: mix-node-agent
    workload: daemonset
# Desired state of this object
spec:
  # Selector used to choose matching pods or objects
  selector:
    # Label matching rules for selectors
    matchLabels:
      app: mix-node-agent
      workload: daemonset
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  # Pod template for controllers like Deployment/StatefulSet
  template:
    # Object metadata: name, namespace, labels, annotations
    metadata:
      # Labels used for grouping and selecting objects
      labels:
        app: mix-node-agent
        workload: daemonset
    # Desired state of this object
    spec:
      terminationGracePeriodSeconds: 10
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      # Container definitions in the pod
      containers:
        - name: node-agent
          # Container image to run
          image: busybox:1.36
          # When Kubernetes pulls the container image
          imagePullPolicy: IfNotPresent
          # Container startup command
          command:
            - /bin/sh
            - -c
          args:
            - |
              while true; do
                echo "$(date) node-agent pod=${POD_NAME} node=${NODE_NAME}";
                sleep 30;
              done
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          # CPU/memory requests and limits or other resource settings
          resources:
            # Guaranteed resources requested for scheduling
            requests:
              cpu: 10m
              memory: 16Mi
            # Maximum resources the container may use
            limits:
              cpu: 50m
              memory: 64Mi
