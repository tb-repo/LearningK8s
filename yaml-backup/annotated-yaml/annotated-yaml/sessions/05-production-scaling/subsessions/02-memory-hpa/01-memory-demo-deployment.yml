# API version of this Kubernetes object
# API version of this Kubernetes object
apiVersion: apps/v1
# Type of Kubernetes resource
# Type of Kubernetes resource
kind: Deployment
# Object metadata: name, namespace, labels, annotations
# Object metadata: name, namespace, labels, annotations
metadata:
  # Name of the object or container
  # Name of the object or container
  name: memory-demo
  # Namespace in which the object is created
  # Namespace in which the object is created
  namespace: app-scaling-prod
  # Labels used for grouping and selecting objects
  # Labels used for grouping and selecting objects
  labels:
    app: memory-demo
    scaling-demo: memory-hpa
# Desired state of this object
# Desired state of this object
spec:
  # Desired number of pod replicas
  # Desired number of pod replicas
  replicas: 1
  # Selector used to choose matching pods or objects
  # Selector used to choose matching pods or objects
  selector:
    # Label matching rules for selectors
    # Label matching rules for selectors
    matchLabels:
      app: memory-demo
      scaling-demo: memory-hpa
  # Pod template for controllers like Deployment/StatefulSet
  # Pod template for controllers like Deployment/StatefulSet
  template:
    # Object metadata: name, namespace, labels, annotations
    # Object metadata: name, namespace, labels, annotations
    metadata:
      # Labels used for grouping and selecting objects
      # Labels used for grouping and selecting objects
      labels:
        app: memory-demo
        scaling-demo: memory-hpa
    # Desired state of this object
    # Desired state of this object
    spec:
      # Container definitions in the pod
      # Container definitions in the pod
      containers:
        - name: memory-demo
          # Container image to run
          # Container image to run
          image: python:3.12-alpine
          # When Kubernetes pulls the container image
          # When Kubernetes pulls the container image
          imagePullPolicy: IfNotPresent
          # Container startup command
          # Container startup command
          command:
            - python
            - -c
          args:
            - |
              from http.server import BaseHTTPRequestHandler, HTTPServer

              chunks = []

              class Handler(BaseHTTPRequestHandler):
                  def log_message(self, fmt, *args):
                      return

                  def do_GET(self):
                      if self.path.startswith("/allocate"):
                          chunks.append(bytearray(2 * 1024 * 1024))
                          body = f"allocated_chunks={len(chunks)} approx_mib={len(chunks) * 2}\n"
                      elif self.path.startswith("/release"):
                          chunks.clear()
                          body = "released\n"
                      elif self.path.startswith("/healthz") or self.path.startswith("/readyz"):
                          body = "ok\n"
                      else:
                          body = "use /allocate, /release, /healthz, or /readyz\n"
                      self.send_response(200)
                      self.send_header("Content-Type", "text/plain")
                      self.end_headers()
                      self.wfile.write(body.encode())

              HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          # Ports exposed by this object or container
          # Ports exposed by this object or container
          ports:
            - name: http
              # Port exposed by the container
              # Port exposed by the container
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              # Port exposed by the Service or container
              # Port exposed by the Service or container
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              # Port exposed by the Service or container
              # Port exposed by the Service or container
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          # CPU/memory requests and limits or other resource settings
          # CPU/memory requests and limits or other resource settings
          resources:
            # Guaranteed resources requested for scheduling
            # Guaranteed resources requested for scheduling
            requests:
              cpu: "50m"
              memory: "64Mi"
            # Maximum resources the container may use
            # Maximum resources the container may use
            limits:
              cpu: "250m"
              memory: "192Mi"
